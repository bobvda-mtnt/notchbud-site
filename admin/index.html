<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>NotchBud · Admin</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100svh; display: flex; align-items: center; justify-content: center;
    background: linear-gradient(180deg, #a6a4c8 0%, #aeb5c5 40%, #c6d3c4 75%, #d5e1cf 100%);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
    color: #1d1d1f; text-align: center; padding: 24px;
  }
  .card {
    background: rgba(255,255,255,.72); backdrop-filter: blur(24px);
    border-radius: 28px; padding: 48px 44px; max-width: 420px;
    box-shadow: 0 30px 80px rgba(20,20,30,.18);
  }
  h1 { font-size: 24px; font-weight: 800; letter-spacing: -.03em; margin-bottom: 10px; }
  p { font-size: 14px; color: #6e6e73; line-height: 1.55; margin-bottom: 26px; }
  a.btn {
    display: inline-block; background: #1d1d1f; color: #fff; text-decoration: none;
    font-weight: 600; font-size: 15px; padding: 14px 30px; border-radius: 999px;
    transition: transform .45s cubic-bezier(.32,1.16,.45,1);
  }
  a.btn:hover { transform: scale(1.03); }
  .hint { font-size: 12px; color: #86868b; margin-top: 20px; margin-bottom: 0; }
</style>
</head>
<body>
  <div class="card">
    <h1>NotchBud Analytics</h1>
    <p>Pageviews, referrers, countries, devices, and the download and buy-click event counts, all live. Sign in with your GoatCounter account.</p>
    <a class="btn" href="https://notchbud.goatcounter.com">Open dashboard</a>
    <p class="hint">Events: <b>download-dmg</b> and <b>buy-click</b> under "Pages".</p>
  </div>
</body>
</html>
